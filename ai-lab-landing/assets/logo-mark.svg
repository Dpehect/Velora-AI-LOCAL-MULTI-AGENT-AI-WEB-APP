<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Velora">
  <defs>
    <linearGradient id="vg" x1="12" y1="8" x2="52" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818CF8"/>
      <stop offset="0.5" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="vgSoft" x1="20" y1="16" x2="44" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#C7D2FE"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Soft tile -->
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#vgSoft)" opacity="0.55"/>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="white" fill-opacity="0.35"/>
  <rect x="4.75" y="4.75" width="54.5" height="54.5" rx="15.25" stroke="url(#vg)" stroke-opacity="0.22" stroke-width="1.5"/>
  <!-- Abstract V / neural arc -->
  <path
    d="M18 22.5c0 0 6.5 18.5 14 24.5 7.5-6 14-24.5 14-24.5"
    stroke="url(#vg)"
    stroke-width="3.25"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />
  <!-- Soft secondary orbit -->
  <path
    d="M22 20c8 3 12 12 12 12s4-9 12-12"
    stroke="#6366F1"
    stroke-opacity="0.28"
    stroke-width="1.5"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Intelligence node -->
  <circle cx="32" cy="47" r="3.25" fill="url(#vg)" filter="url(#glow)"/>
  <circle cx="32" cy="47" r="1.35" fill="white" fill-opacity="0.9"/>
</svg>
