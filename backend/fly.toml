# Velora AI Lab — Fly.io app config
# Docs: https://fly.io/docs/reference/configuration/
#
# Deploy from this directory:
#   cd backend
#   fly launch   # first time (or fly apps create)
#   fly deploy

app = "velora-ai-lab-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  # Override at runtime: fly secrets set OLLAMA_BASE_URL=...
  OLLAMA_BASE_URL = "http://localhost:11434"
  OLLAMA_MODEL = "qwen2.5:7b"
  API_TITLE = "Velora AI Lab"
  API_VERSION = "0.3.0"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
